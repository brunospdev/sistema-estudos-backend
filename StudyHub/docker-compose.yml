services:
  postgres:
    image: postgres:16-alpine
    container_name: studyhub-postgres
    environment:
      POSTGRES_DB: studyhub
      POSTGRES_USER: studyhub
      POSTGRES_PASSWORD: studyhub
    ports:
      - "5433:5432"
    volumes:
      - studyhub_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyhub -d studyhub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  studyhub_pg_data:
