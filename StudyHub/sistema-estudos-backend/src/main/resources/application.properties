spring.application.name=studyhub-backend
server.port=8080

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/studyhub}
spring.datasource.username=${DB_USERNAME:studyhub}
spring.datasource.password=${DB_PASSWORD:studyhub}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET:minha-chave-secreta-desenvolvimento-local-32chars}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}

security.rate-limit.auth-max=${RATE_LIMIT_AUTH_MAX:10}
security.rate-limit.api-max=${RATE_LIMIT_API_MAX:120}
security.rate-limit.window-ms=${RATE_LIMIT_WINDOW_MS:60000}
security.login.max-attempts=${LOGIN_MAX_ATTEMPTS:5}
security.login.lockout-minutes=${LOGIN_LOCKOUT_MINUTES:15}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
